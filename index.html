<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BROW ACADEMY | загрузка</title>
    
    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #f0e7e0;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        /* Эффект ткани */
        .fabric-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 30% 40%, rgba(181, 139, 122, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 70% 60%, rgba(181, 139, 122, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }
        
        /* Основной контейнер */
        .preloader {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        /* Логотип */
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3rem, 12vw, 5rem);
            font-weight: 600;
            color: #2e2e2e;
            line-height: 1;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
            text-align: center;
            width: 100%;
            display: block;
        }
        
        .logo span {
            color: #b58b7a;
            font-weight: 500;
            display: inline-block;
        }
        
        .sub {
            font-size: 1rem;
            color: #5a4a44;
            font-weight: 300;
            margin-bottom: 3rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-align: center;
            width: 100%;
            display: block;
        }
        
        /* Декоративные элементы (микро-брови) */
        .decor {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.2rem;
            margin: 2rem 0 1rem;
            width: 100%;
        }
        
        .decor-item {
            width: 30px;
            height: 2px;
            background-color: #b58b7a;
            opacity: 0.3;
            border-radius: 2px;
            flex-shrink: 0;
        }
        
        .decor-item:nth-child(1) { 
            transform: rotate(-5deg) translateY(2px); 
        }
        .decor-item:nth-child(2) { 
            width: 40px; 
            opacity: 0.5; 
        }
        .decor-item:nth-child(3) { 
            transform: rotate(5deg) translateY(2px); 
        }
        
        /* Линия загрузки */
        .loader-line {
            width: 200px;
            height: 1px;
            background-color: rgba(181, 139, 122, 0.2);
            margin: 2rem auto;
            position: relative;
            overflow: hidden;
            display: block;
        }
        
        .loader-line::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 60px;
            background-color: #b58b7a;
            animation: moveLine 2.2s cubic-bezier(0.45, 0, 0.55, 1) infinite;
            box-shadow: 0 0 15px rgba(181, 139, 122, 0.5);
        }
        
        @keyframes moveLine {
            0% { left: -60px; }
            100% { left: 100%; }
        }
        
        /* Счетчик */
        .counter {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            color: #b58b7a;
            margin: 1rem 0;
            font-weight: 500;
            opacity: 0.8;
            text-align: center;
            width: 100%;
            display: block;
        }
        
        /* Статус */
        .status {
            font-size: 0.9rem;
            color: #a07767;
            font-weight: 300;
            letter-spacing: 0.05em;
            text-transform: lowercase;
            text-align: center;
            width: 100%;
            display: block;
        }
        
        /* Затемнение при редиректе */
        .fade-out {
            animation: fadeOut 0.8s ease forwards;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        /* Мобильная адаптация */
        @media (max-width: 640px) {
            .loader-line {
                width: 160px;
            }
            
            .counter {
                font-size: 1.8rem;
            }

            .logo {
                font-size: clamp(2.5rem, 10vw, 4rem);
            }

            .sub {
                font-size: 0.85rem;
                margin-bottom: 2rem;
            }

            .decor {
                gap: 1rem;
            }
        }

        @media (max-width: 380px) {
            .logo {
                font-size: 2.2rem;
            }

            .sub {
                font-size: 0.75rem;
                letter-spacing: 0.15em;
            }

            .decor-item:nth-child(1),
            .decor-item:nth-child(3) {
                width: 25px;
            }

            .decor-item:nth-child(2) {
                width: 35px;
            }
        }
    </style>
</head>
<body>
    <div class="fabric-overlay"></div>
    
    <div class="preloader" id="preloader">
        <h1 class="logo">
            BROW<span>ACADEMY</span>
        </h1>
        <div class="sub">Регина • Минск</div>
        
        <div class="decor">
            <div class="decor-item"></div>
            <div class="decor-item"></div>
            <div class="decor-item"></div>
        </div>
        
        <div class="loader-line"></div>
        
        <div class="counter" id="counter">0%</div>
        <div class="status" id="status">загрузка</div>
    </div>

    <script>
        (function() {
            const counterEl = document.getElementById('counter');
            const statusEl = document.getElementById('status');
            const preloader = document.getElementById('preloader');
            
            let percent = 0;
            const statuses = ['подготовка', 'загрузка', 'почти готово', 'перенаправление'];
            let statusIndex = 0;
            
            // Анимация счетчика
            const interval = setInterval(() => {
                if (percent < 100) {
                    percent += Math.floor(Math.random() * 4) + 1;
                    if (percent > 100) percent = 100;
                    
                    counterEl.textContent = percent + '%';
                    
                    if (percent >= 30 && percent < 60 && statusIndex === 0) {
                        statusEl.textContent = statuses[1];
                        statusIndex = 1;
                    } else if (percent >= 60 && percent < 90 && statusIndex === 1) {
                        statusEl.textContent = statuses[2];
                        statusIndex = 2;
                    } else if (percent >= 90 && statusIndex === 2) {
                        statusEl.textContent = statuses[3];
                        statusIndex = 3;
                    }
                } else {
                    clearInterval(interval);
                    statusEl.textContent = 'добро пожаловать';
                    
                    setTimeout(() => {
                        preloader.classList.add('fade-out');
                        setTimeout(() => {
                            window.location.href = 'home.html';
                        }, 800);
                    }, 600);
                }
            }, 70);
            
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 5000);
        })();
    </script>
</body>
</html>
